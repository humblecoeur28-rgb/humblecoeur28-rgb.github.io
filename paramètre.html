<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paramètres</title>

<style>
*{
 box-sizing:border-box;
 font-family:Arial,sans-serif;
}

body{
 margin:0;
 background:#f5f6f7;
 color:#222;
}

.header{
 background:#008542;
 color:white;
 height:65px;
 display:flex;
 align-items:center;
 padding:0 20px;
 font-size:20px;
 font-weight:bold;
}

.back{
 font-size:30px;
 margin-right:20px;
 color:white;
 text-decoration:none;
}

.container{
 padding:20px;
}

.menu{
 background:white;
 border-radius:18px;
 overflow:hidden;
 box-shadow:0 3px 10px #ddd;
}

.item{
 display:flex;
 align-items:center;
 padding:18px;
 border-bottom:1px solid #eee;
 gap:15px;
}

.item:last-child{
 border-bottom:none;
}

.item i:first-child{
 color:#008542;
 font-size:22px;
 width:30px;
}

.text{
 flex:1;
}

.text h3{
 margin:0;
 font-size:16px;
}

.text p{
 margin:5px 0 0;
 color:#777;
 font-size:13px;
}

</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>


<div class="header">
<a href="profil.html" class="back">‹</a>
Paramètres
</div>


<div class="container">

<div class="menu">


<div class="item">
<i class="fa-solid fa-lock"></i>

<div class="text">
<h3>Sécurité</h3>
<p>Mot de passe, connexion, validation</p>
</div>

<i class="fa-solid fa-chevron-right"></i>
</div>


<div class="item">
<i class="fa-solid fa-bell"></i>

<div class="text">
<h3>Notifications</h3>
<p>Gérer vos alertes</p>
</div>

<i class="fa-solid fa-chevron-right"></i>
</div>


<div class="item">
<i class="fa-solid fa-language"></i>

<div class="text">
<h3>Langue</h3>
<p>Modifier la langue de l’application</p>
</div>

<i class="fa-solid fa-chevron-right"></i>
</div>


<div class="item">
<i class="fa-solid fa-circle-info"></i>

<div class="text">
<h3>À propos</h3>
<p>Informations sur l'application</p>
</div>

<i class="fa-solid fa-chevron-right"></i>
</div>


</div>

</div>

</body>
</html>
