<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Effectuer un virement</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#f5f6f7;
color:#222;
}


.header{
height:65px;
background:#008542;
color:white;
display:flex;
align-items:center;
padding:0 20px;
font-size:20px;
font-weight:bold;
}


.back{
font-size:30px;
color:white;
text-decoration:none;
margin-right:20px;
}


.container{
padding:20px;
}


.card{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 3px 10px #ddd;
}


h2{
margin-top:0;
}


label{
display:block;
margin-top:18px;
font-size:14px;
color:#555;
}


input, select{

width:100%;
padding:14px;
margin-top:8px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;

}


button{

width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:12px;
background:#008542;
color:white;
font-size:16px;
font-weight:bold;

}


.info{

margin-top:15px;
padding:12px;
background:#f1f1f1;
border-radius:12px;
font-size:14px;

}


</style>

</head>


<body>


<div class="header">

<a href="index.html" class="back">‹</a>

Effectuer un virement

</div>



<div class="container">


<div class="card">


<h2>Nouveau virement</h2>


<label>
Depuis quel compte ?
</label>


<select id="compte">

<option value="cheque">
Compte de chèques
</option>

<option value="epargne">
Compte épargne (bloqué)
</option>

</select>



<label>
Nom du bénéficiaire
</label>


<input 
id="nom"
type="text"
placeholder="Nom du bénéficiaire">



<label>
Montant
</label>


<input 
id="montant"
type="number"
placeholder="Montant en €">



<div class="info">

Le montant maximum autorisé est de 25 €.

</div>



<button onclick="continuerVirement()">

Continuer

</button>



</div>


</div>




<script>


function continuerVirement(){


let compte =
document.getElementById("compte").value;


let nom =
document.getElementById("nom").value;


let montant =
document.getElementById("montant").value;



localStorage.setItem("compteVirement", compte);

localStorage.setItem("nomBeneficiaire", nom);

localStorage.setItem("montantVirement", montant);



window.location.href =
"confirmation-virement.html";


}



</script>


</body>
</html>
